[changelog]
header = """
# Changelog\n
"""
body = """
{% if version %}\
    ## {{ version | trim_start_matches(pat="v") }} — {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## Unreleased
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | upper_first }}
    {% for commit in commits %}
        - {{ commit.message | split(pat="\n") | first | trim }}\
    {% endfor %}
{% endfor %}\n
"""
trim = true

[git]
conventional_commits = false
split_commits = false
commit_parsers = [
    { message = "^Add", group = "Added" },
    { message = "^feat", group = "Added" },
    { message = "^Fix", group = "Fixed" },
    { message = "^fix", group = "Fixed" },
    { message = "^Redesign", group = "Changed" },
    { message = "^Migrate", group = "Changed" },
    { message = "^Refactor", group = "Changed" },
    { message = "^Switch", group = "Changed" },
    { message = "^Remove", group = "Changed" },
    { message = "^Extract", group = "Changed" },
    { message = "^Escape", group = "Changed" },
    { message = "^Restore", group = "Changed" },
    { message = "^Pause", group = "Changed" },
    { message = "^Merge pull request", skip = true },
    { message = "^Merge branch", skip = true },
    { body = ".*", group = "Other" },
]
filter_commits = false
tag_pattern = "v[0-9].*"
sort_commits = "newest"
